AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAf/2Q==\"\n                        style=\"width:780px;display:block;transform:translateY(0);will-change:transform;\" />\n                      <div class=\"device-overlay\">\ud83d\udda5\ufe0f Desktop 2K (2560px)</div>\n                      <div class=\"scroll-hint\" style=\"position:absolute;inset:0;display:flex;align-items:flex-end;\n                        justify-content:center;padding-bottom:16px;pointer-events:none;opacity:0;transition:opacity 0.3s;\">\n                        <div style=\"background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);\n                          color:#fff;font-size:12px;font-weight:600;padding:8px 16px;border-radius:20px;\">\n                          \u21ba Click to resume auto-scroll</div>\n                      </div>\n                    </div>\n                    <div style=\"background:#1c1c1e;height:20px;display:flex;justify-content:center;align-items:center;\">\n                      <div style=\"width:80px;height:4px;background:#333;border-radius:2px;\"></div>\n                    </div>\n                  </div>\n                  <button class=\"full-toggle\">\u2295 Show full image</button>\n                </div>"};
    
    let currentFilter = 'all';
    
    // Tree expand/collapse function
    function toggleTreeNode(toggleElement) {
      toggleElement.classList.toggle('expanded');
      const treeNodeHeader = toggleElement.parentElement;
      const treeNode = treeNodeHeader.parentElement;
      const childList = treeNode.querySelector('.tree-level');
      if (childList) {
        childList.classList.toggle('collapsed');
      }
    }
    
    // Theme toggle function
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    
    // Load saved theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
    }
    
    function loadReport(pageId, buttonElement) {
      const viewer = document.getElementById('report-viewer');
      const placeholder = document.getElementById('placeholder');
      
      if (reports[pageId]) {
        viewer.innerHTML = reports[pageId];
        viewer.style.display = 'block';
        placeholder.style.display = 'none';
        
        // Highlight active button
        document.querySelectorAll('.tree-button').forEach(btn => btn.classList.remove('active'));
        if (buttonElement) {
          buttonElement.classList.add('active');
        }
        
        // Apply current filter
        filterDevices(currentFilter);
      } else {
        console.error('Report not found:', pageId);
        viewer.innerHTML = '<p>Report not found: ' + pageId + '</p>';
        viewer.style.display = 'block';
        placeholder.style.display = 'none';
      }
    }
    
    function filterDevices(group) {
      currentFilter = group;
      const frames = document.querySelectorAll('.device-card');
      frames.forEach(frame => {
        const frameGroup = frame.getAttribute('data-group');
        if (group === 'all' || frameGroup === group) {
          frame.style.display = 'inline-block';
        } else {
          frame.style.display = 'none';
        }
      });
      
      // Update filter button states
      document.querySelectorAll('.filter-bar button').forEach(btn => {
        btn.classList.remove('active');
        if (btn.getAttribute('data-filter') === group) {
          btn.classList.add('active');
        }
      });
      
      // Setup scroll for newly visible screens
      document.querySelectorAll('.device-screen').forEach(setupScroll);
    }
    
    // ── Scroll engine: set up auto-scroll + click-to-control ──
    function setupScroll(screen) {
      if (screen._scrollSetup) return;
      screen._scrollSetup = true;
      const img = screen.querySelector('img');
      const hint = screen.querySelector('.scroll-hint');
      const card = screen.closest('.device-card');
      const speed = parseFloat(screen.dataset.speed || '0.8');
      const origH = parseInt(screen.dataset.origH || screen.clientHeight);
      const toggleBtn = card ? card.querySelector('.full-toggle') : null;
      let pos = 0, rafId = null, manual = false, pausing = false, fullView = false;

      function maxScroll() { return img.offsetHeight - screen.clientHeight; }

      function easeBack() {
        pausing = true;
        img.style.transition = 'transform 0.9s cubic-bezier(0.4,0,0.2,1)';
        img.style.transform = 'translateY(0)';
        setTimeout(() => { pos = 0; img.style.transition = 'none'; pausing = false; }, 950);
      }

      function startAuto() {
        manual = false; pausing = false; fullView = false;
        screen.style.height = origH + 'px';
        screen.style.overflowY = 'hidden'; screen.style.overflowX = 'hidden';
        screen.style.cursor = 'pointer'; screen.scrollTop = 0; pos = 0;
        img.style.willChange = 'transform'; img.style.transform = 'translateY(0)'; img.style.transition = 'none';
        if (hint) hint.style.opacity = '0';
        if (toggleBtn) { toggleBtn.textContent = '⊕ Show full image'; toggleBtn.classList.remove('active'); }
        if (!rafId) rafId = requestAnimationFrame(step);
      }

      function enterManual() {
        manual = true; pausing = false;
        img.style.transition = 'transform 0.4s ease'; img.style.transform = 'translateY(0)'; pos = 0;
        setTimeout(() => {
          img.style.transition = 'none';
          screen.style.overflowY = 'auto'; screen.style.cursor = 'grab';
          img.style.transform = ''; img.style.willChange = 'auto';
        }, 420);
        if (hint) hint.style.opacity = '1';
      }

      function enterFullView() {
        fullView = true; manual = true; pausing = false;
        if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
        img.style.transition = 'none'; img.style.transform = 'translateY(0)';
        img.style.willChange = 'auto'; pos = 0;
        if (hint) hint.style.opacity = '0';
        screen.style.transition = 'height 0.4s cubic-bezier(0.4,0,0.2,1)';
        screen.style.height = img.offsetHeight + 'px';
        screen.style.overflowY = 'visible'; screen.style.overflowX = 'visible';
        screen.style.cursor = 'default';
        setTimeout(() => { screen.style.transition = ''; }, 420);
        if (toggleBtn) { toggleBtn.textContent = '✕ Collapse'; toggleBtn.classList.add('active'); }
      }

      function step() {
        if (!manual && !pausing) {
          pos += speed;
          const max = maxScroll();
          if (pos >= max) {
            pos = max; img.style.transform = `translateY(-${pos}px)`;
            pausing = true; setTimeout(easeBack, 1400);
          } else { img.style.transform = `translateY(-${pos}px)`; }
        }
        rafId = requestAnimationFrame(step);
      }

      const delay = Math.random() * 1500;
      setTimeout(() => { rafId = requestAnimationFrame(step); }, delay);

      screen.addEventListener('click', () => { if (fullView) return; if (!manual) enterManual(); else startAuto(); });
      screen.addEventListener('mousedown', () => { if (manual && !fullView) screen.style.cursor = 'grabbing'; });
      screen.addEventListener('mouseup',   () => { if (manual && !fullView) screen.style.cursor = 'grab'; });

      if (toggleBtn && !toggleBtn._bound) {
        toggleBtn._bound = true;
        toggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          screen._toggleFull();
        });
      }
      screen._toggleFull = () => { if (!fullView) enterFullView(); else startAuto(); };
      screen._startAuto = startAuto;
    }
    
    // Initialize scroll animation when reports are loaded
    const observer = new MutationObserver(() => {
      document.querySelectorAll('.device-screen:not([data-scroll-init])').forEach(screen => {
        screen.setAttribute('data-scroll-init', 'true');
        setupScroll(screen);
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
